name: Deploy to Cloudflare Pages

on:
  # Publish only on a release cut or a new/updated blog post — NOT on every
  # docs/standards change merged to main.
  release:
    types: [published]
  push:
    branches:
      - main
    paths:
      - 'website/src/content/docs/blog/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-cloudflare-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: cd website && rm -rf node_modules package-lock.json && npm install

      - name: Build
        run: cd website && npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: website
          # `pages deploy` reads the project name + output dir from wrangler.jsonc.
          # --branch=main marks this as a production deployment (the project's
          # production branch must be set to `main`).
          command: pages deploy --branch=main
