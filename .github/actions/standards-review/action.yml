name: 'Standards Review'
description: 'Run standards compliance linter and post results as PR comment'
inputs:
  standards-path:
    description: 'Path to .standards/ submodule (default: .standards)'
    required: false
    default: '.standards'
runs:
  using: 'composite'
  steps:
    - name: Run standards linter
      id: lint
      shell: bash
      run: |
        LINTER="${{ inputs.standards-path }}/scripts/lint-standards.sh"
        if [ ! -f "$LINTER" ]; then
          LINTER="scripts/lint-standards.sh"
        fi
        if [ -f "$LINTER" ]; then
          chmod +x "$LINTER"
          RESULTS=$("$LINTER" --format json 2>/dev/null || true)
          if [ -z "$RESULTS" ]; then
            RESULTS='{"summary":{"pass":0,"warn":0,"fail":0,"total":0},"results":[]}'
          fi
          echo "results<<RESULTS_EOF" >> "$GITHUB_OUTPUT"
          echo "$RESULTS" >> "$GITHUB_OUTPUT"
          echo "RESULTS_EOF" >> "$GITHUB_OUTPUT"

          # Count results from JSON summary block
          PASS=$(echo "$RESULTS" | grep -o '"pass":[[:space:]]*[0-9]*' | head -1 | grep -o '[0-9]*$' || echo 0)
          WARN=$(echo "$RESULTS" | grep -o '"warn":[[:space:]]*[0-9]*' | head -1 | grep -o '[0-9]*$' || echo 0)
          FAIL=$(echo "$RESULTS" | grep -o '"fail":[[:space:]]*[0-9]*' | head -1 | grep -o '[0-9]*$' || echo 0)
          PASS="${PASS:-0}"
          WARN="${WARN:-0}"
          FAIL="${FAIL:-0}"
          echo "pass=$PASS" >> "$GITHUB_OUTPUT"
          echo "warn=$WARN" >> "$GITHUB_OUTPUT"
          echo "fail=$FAIL" >> "$GITHUB_OUTPUT"
          if [ "$FAIL" -gt 0 ]; then
            echo "has_failures=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_failures=false" >> "$GITHUB_OUTPUT"
          fi
        else
          echo "::error::Linter script not found. Check standards-path and submodule checkout."
          echo "results={}" >> "$GITHUB_OUTPUT"
          echo "pass=0" >> "$GITHUB_OUTPUT"
          echo "warn=0" >> "$GITHUB_OUTPUT"
          echo "fail=1" >> "$GITHUB_OUTPUT"
          echo "has_failures=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Post PR comment
      if: github.event_name == 'pull_request'
      continue-on-error: true
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        LINT_RESULTS: ${{ steps.lint.outputs.results }}
      run: |
        PASS="${{ steps.lint.outputs.pass }}"
        WARN="${{ steps.lint.outputs.warn }}"
        FAIL="${{ steps.lint.outputs.fail }}"
        TOTAL=$((PASS + WARN + FAIL))

        if [ "$TOTAL" -eq 0 ]; then
          echo "No lint results to post"
          exit 0
        fi

        # Build comment body in a temp file to avoid shell quoting issues
        COMMENT_FILE=$(mktemp)

        {
          printf "## Standards Review\n\n"
          if [ "$FAIL" -gt 0 ]; then
            printf ":x: **%s failure(s)** found\n\n" "$FAIL"
          elif [ "$WARN" -gt 0 ]; then
            printf ":warning: **%s warning(s)** found\n\n" "$WARN"
          else
            printf ":white_check_mark: All checks passed\n\n"
          fi
          printf "| Status | Check | Details |\n"
          printf "|--------|-------|--------|\n"

          # Parse JSON results array using python3 (available on all GitHub-hosted runners)
          if command -v python3 >/dev/null 2>&1; then
            python3 - "$LINT_RESULTS" <<'PYEOF'
import sys, json

raw = sys.argv[1] if len(sys.argv) > 1 else "{}"
try:
    data = json.loads(raw)
    results = data.get("results", [])
except (json.JSONDecodeError, ValueError):
    results = []

icons = {"PASS": ":white_check_mark:", "WARN": ":warning:", "FAIL": ":x:"}
for r in results:
    status = r.get("status", "")
    check = r.get("check", "")
    message = r.get("message", "").replace("|", "\\|").replace("\n", " ")
    icon = icons.get(status, ":grey_question:")
    print(f"| {icon} {status} | {check} | {message} |")
PYEOF
          fi

          printf "\n---\n"
          printf "*Generated by [Coding Standards](https://coding-standards.c65llc.com) linter*\n"
        } > "$COMMENT_FILE"

        gh pr comment "${{ github.event.pull_request.number }}" --edit-last --body-file "$COMMENT_FILE" 2>/dev/null || \
        gh pr comment "${{ github.event.pull_request.number }}" --body-file "$COMMENT_FILE"
        rm -f "$COMMENT_FILE"

    - name: Set check status
      if: steps.lint.outputs.has_failures == 'true'
      shell: bash
      run: |
        echo "::error::Standards compliance check failed with ${{ steps.lint.outputs.fail }} failure(s)"
        exit 1
